name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
      - name: Ensure run_tests.sh is executable
        run: |
          if [ -f ./run_tests.sh ]; then chmod +x ./run_tests.sh; fi
      - name: Normalize line endings
        run: |
          if [ -f ./run_tests.sh ]; then sed -i 's/\r$//' run_tests.sh || true; fi
      - name: Run tests
        run: |
          export PYTHONPATH=.
          if [ -f ./run_tests.sh ]; then ./run_tests.sh; else echo "No tests to run"; fi
      - name: Show Python version
        run: python --version
